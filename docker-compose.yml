services:
  mongo:
    image: mongo:7
    container_name: fittrack-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 4s
      retries: 12

  api:
    build: ./api
    container_name: fittrack-api
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: fittrack
      PORT: "4100"
    ports:
      - "4100:4100"
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build: ./web
    container_name: fittrack-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mongo-data:
